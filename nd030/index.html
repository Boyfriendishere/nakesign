const lb=document.getElementById('lightbox'),lbImg=document.getElementById('lb-img'),lbCount=document.getElementById('lb-count');
let cur=0,active=[];
function openLb(set,i){active=SETS[set];cur=i;lbImg.src=active[i];lbCount.textContent=(i+1)+' / '+active.length;lb.classList.add('active');document.body.style.overflow='hidden';}
function closeLb(){lb.classList.remove('active');document.body.style.overflow='';}
function goTo(i){cur=(i+active.length)%active.length;lbImg.classList.add('fading');setTimeout(()=>{lbImg.src=active[cur];lbCount.textContent=(cur+1)+' / '+active.length;lbImg.classList.remove('fading');},200);}
document.querySelectorAll('.gallery-thumb').forEach(el=>el.addEventListener('click',()=>openLb(el.dataset.set,+el.dataset.index)));
document.getElementById('lb-close').addEventListener('click',closeLb);
document.getElementById('lb-prev').addEventListener('click',()=>goTo(cur-1));
document.getElementById('lb-next').addEventListener('click',()=>goTo(cur+1));
lb.addEventListener('click',e=>{if(e.target===lb)closeLb();});
document.addEventListener('keydown',e=>{if(!lb.classList.contains('active'))return;if(e.key==='Escape')closeLb();if(e.key==='ArrowLeft')goTo(cur-1);if(e.key==='ArrowRight')goTo(cur+1);});
